<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arirang Event 🎟️</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #000000;
      color: white;
    }header {
  background: linear-gradient(90deg, #000000, #e50914);
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 2px;
}

.container {
  padding: 30px;
  max-width: 800px;
  margin: auto;
}

.evento {
  background: #111111;
  border: 1px solid #e50914;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 15px rgba(229,9,20,0.3);
}

.evento h2 {
  margin-bottom: 10px;
  color: #ffffff;
}

.opcoes {
  margin-top: 20px;
}

.ticket {
  background: #000000;
  border: 1px solid #ffffff;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ticket strong {
  color: #e50914;
}

.botao {
  background-color: #e50914;
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

.botao:hover {
  background-color: #b20710;
}

  </style>
</head>
<body><header>
  ARIRANG EVENT 🔥
</header><div class="container">
  <div class="evento">
    <h2>Show Especial BTS Inspired</h2>
    <p>Data: 20/07/2026</p>
    <p>Local: Rio de Janeiro</p><div class="opcoes">
  <div class="ticket">
    <div>
      <p><strong>Ingresso com Kit</strong></p>
      <p>Entrada + kit exclusivo</p>
    </div>
    <div>
      <p>R$15</p>
      <button class="botao" onclick="comprar('Kit')">Comprar</button>
    </div>
  </div>

  <div class="ticket">
    <div>
      <p><strong>Entrada sem Kit</strong></p>
      <p>Entrada gratuita</p>
    </div>
    <div>
      <p>Gratuito</p>
      <button class="botao" onclick="comprar('SemKit')">Reservar</button>
    </div>
  </div>
</div>

  </div>
</div><script>
  function comprar(tipo) {
    if(tipo === 'Kit'){
      alert('Você escolheu ingresso com kit (R$15). Aqui podemos integrar PIX/cartão!');
    } else {
      alert('Reserva gratuita sem kit confirmada!');
    }
  }
</script></body>
</html>
